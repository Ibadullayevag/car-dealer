<!DOCTYPE html>
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Marketplace</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

  <body>
    
    
<div class="hero">
    <header>
        <div class="header-left">
            <img src="./img/14a657d29d5773af990b6ee853e6b4d4d7e5c1da.png" alt="">
        </div>
        <div class="header-right">
            <div class="ateglar">
                <a href="#">Home</a>
                <a href="#">Listings</a>
                <a href="#">Blog</a>
                <a href="#">Pages</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </div>
            <div class="sign-submit">
                <div class="signin">
                    <p><i class="fa-regular fa-user"></i> Sign in</p>
                </div>
                <div class="btn">
                    <button>Submit Listing</button>
                </div>
            </div>
        </div>
    </header>



    <div class="main">
    <div class="main-text">
        <p class="find">Find cars for sale and for rent near you</p>
        <b class="find2">Find Your Perfect Car</b>
        <div class="a-n-u">
            <a href="#">All</a>
            <span>New</span>
            <span>Used</span>
        </div>
    </div>
    <div class="white-div">
        <div class="anys">
            <div class="any-makes">
                <p>Any Makes</p>
            </div>
            <div class="any-models">
                <p>Any Models</p>
            </div>
        </div>

        <div class="pri-all">
            <div class="prices">
                <p>Prices</p>
            </div>
            <div class="allprices">
                <p>All prices</p>
            </div>

        </div>
        <div class="btn2">
            <button><i class="fa-solid fa-magnifying-glass"></i> Search Cars</button>
        </div>
    </div>

    <div class="orbrow">
        <p>Or Browse Featured Model</p>
    </div>

    <div class="btns">
        <button class="suv"><i class="fa-solid fa-car-side"></i>suv</button>
        <button class="sedan"><i class="fa-solid fa-car-side"></i>Sedan</button>
        <button class="hatchback"><i class="fa-solid fa-car-side"></i>Hatchback</button>
        <button class="coupe"><i class="fa-solid fa-car-side"></i>Coupe</button>
        <button class="hybrid"><i class="fa-solid fa-car-side"></i>Hybrid</button>
    </div>

</div>

</div>
